<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 140">
  <defs>
    <!-- Background: dark brushed-style gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#262626"/>
      <stop offset="50%" style="stop-color:#1b1b1b"/>
      <stop offset="100%" style="stop-color:#141414"/>
    </linearGradient>

    <!-- Subtle vertical noise/stripes -->
    <pattern id="brush" x="0" y="0" width="4" height="140" patternUnits="userSpaceOnUse">
      <rect width="4" height="140" fill="rgba(255,255,255,0)"/>
      <rect x="1" width="1" height="140" fill="rgba(255,255,255,0.03)"/>
    </pattern>

    <!-- Accent line gradient -->
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f7f2a; stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#7cb342; stop-opacity:0.9"/>
      <stop offset="80%" style="stop-color:#7cb342; stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#4f7f2a; stop-opacity:0"/>
    </linearGradient>

    <!-- Soft glow -->
    <filter id="softGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="140" fill="url(#bgGrad)"/>
  <rect width="1200" height="140" fill="url(#brush)" opacity="0.35"/>
  <rect width="1200" height="140" fill="black" opacity="0.18"/>

  <!-- Lowered accent line -->
  <rect x="140" y="82" width="920" height="2" fill="url(#accentLine)"/>
  <rect x="140" y="82" width="920" height="10" fill="#7cb342" opacity="0.08"/>

  <!-- Title -->
  <text x="600" y="72"
        font-family="Segoe UI, Arial Black, sans-serif"
        font-size="40"
        font-weight="bold"
        fill="#7cb342"
        text-anchor="middle"
        letter-spacing="5"
        filter="url(#softGlow)">
    ECHO AUDIO CONVERTER
  </text>

  <!-- Subtitle (shifted down to maintain spacing) -->
  <text x="600" y="112"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="13"
        fill="#7a7a7a"
        text-anchor="middle"
        letter-spacing="2">
    Because Everything Else Is A Pain In The Ass
  </text>
</svg>
